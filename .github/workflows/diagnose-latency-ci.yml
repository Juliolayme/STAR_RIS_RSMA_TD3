name: Diagnose latency CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: python -m pip install -q --no-build-isolation -e ".[dev]"
      - name: Run full pytest and capture log
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -q > pytest.log 2>&1
          status=$?
          tail -n 250 pytest.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latency-ci-pytest-log
          path: pytest.log
          if-no-files-found: error
          retention-days: 7
