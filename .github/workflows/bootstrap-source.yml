name: Bootstrap validated source

on:
  push:
    branches: [main]
    paths:
      - bootstrap/READY

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reassemble and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/part_* > /tmp/source.tar.gz.b64
          base64 --decode /tmp/source.tar.gz.b64 > /tmp/source.tar.gz
          echo "4096c2fe8a4aa5b0c364082d5ca066ae5125dd49af7c98560033bf50ed714d78  /tmp/source.tar.gz" | sha256sum -c -
      - name: Import repository tree
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/source.tar.gz -C .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap-source.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import validated TD3 STAR-RIS RSMA codebase"
          git push origin HEAD:main
