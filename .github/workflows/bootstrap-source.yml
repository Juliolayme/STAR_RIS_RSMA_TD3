name: Bootstrap validated source

on:
  pull_request:
    branches: [main]
    paths: [bootstrap/TRIGGER_PR]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Repair and validate archive chunks
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/D8oreiYYY/D8ereiYYY/' bootstrap/part_01a
          cat <<'EOF' | sha256sum -c -
          b69527687d8f202945e4979e56bb862ebfb272fc9c74648dc1d3af77ddefc2fe  bootstrap/part_00
          5144351794c2712ea21439aa0c0e430471eca7b61652b46a5b78df804507c487  bootstrap/part_01a
          97ad65ea923f9eced9cd6e6a3aefb075c9885d9aa950c7a26276f19a877cbc5e  bootstrap/part_01b
          9144f48be33e9579255d6e456ad3bb37033cf09f19ba4ca9ffb4a4d19dd17009  bootstrap/part_02
          9207f17337c2266ef87185c6c85dd96b1ea3e8fdfee2cbc3f204a09ee7b8ba53  bootstrap/part_03a
          96cb6e4b81d09bb8a6eeab91b00b32604be3ea8d0c36b824b338d0b3e586b94a  bootstrap/part_03b
          d6a438cd00260df6ab19a8d87da4522d004dc618efc2a31c0e41df45c6842fdf  bootstrap/part_03c
          45d9cd81659a03ea445328ff7338f02eb4647794b1137841ea92227ac404485b  bootstrap/part_03d
          ff7990c3bf2f19ec7dece7b745e8fcf4fe4e76672f55d4dcbdf7a6caf7db306f  bootstrap/part_03e
          dea75ea37925df36675eb185838378d5799f0d51b5c1cdb56d4c6c0d8ddbd82b  bootstrap/part_04
          8b7675ae66363924d8996ee9d4306cf5c00d931ac346dbf5d5474d2bbb7ff5d5  bootstrap/part_05
          08dce54e987bfec9ca1226d982adcae86e18341ab0da79902d5cecdebd6ea4cd  bootstrap/part_06a
          0a5f954e7a99cbef8f447a875f014cf6e54b95c9632d00b64c6f8c3a009aec26  bootstrap/part_06b
          b7ebd4bc785fed4b4bea93732f96c8f83c4ba0fd5c11888158a44b3a421054f5  bootstrap/part_06c
          969dd83c8b3e364885c7d91d74df4e51ae7daad45b0a07743cc391f6034b9d0e  bootstrap/part_06d
          809b97ee147f29ddcdd5bbbb2ad3925d3f3dac6eafea5de5d492af480ff6c937  bootstrap/part_06e
          4477c20a0680d06f26cd6696d53d91629fda058df78cd689c69a40269e819a00  bootstrap/part_07a
          f640c3de529d2ae0cf33968f1d9db19ca7e0dd2a6442452f0eaebaffac6904ac  bootstrap/part_07b
          8679c6d41fc70ea7bc5545c29512c1e12d6d7e86e14c1c8c3b8bac8655f2183c  bootstrap/part_07c
          efcb228b1a14e831798d1820bef8e5c7ded3378d6c735bd455b838f894a2727a  bootstrap/part_07d
          5d67f2112abaebfbb2ba9626cb2137242a0998c5199e33053d5261556a073ce3  bootstrap/part_07e
          0602b16de762da7f1a117291c06e8694809c0b1a225595a5a54e11b1cc6095c5  bootstrap/part_08
          EOF
      - name: Reassemble and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/part_00 bootstrap/part_01a bootstrap/part_01b bootstrap/part_02 bootstrap/part_03{a,b,c,d,e} bootstrap/part_04 bootstrap/part_05 bootstrap/part_06{a,b,c,d,e} bootstrap/part_07{a,b,c,d,e} bootstrap/part_08 > /tmp/source.tar.gz.b64
          base64 --decode /tmp/source.tar.gz.b64 > /tmp/source.tar.gz
          echo "4096c2fe8a4aa5b0c364082d5ca066ae5125dd49af7c98560033bf50ed714d78  /tmp/source.tar.gz" | sha256sum -c -
      - name: Import repository tree
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/source.tar.gz -C .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap-source.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import validated TD3 STAR-RIS RSMA codebase"
          git push origin HEAD:main
