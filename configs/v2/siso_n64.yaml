validation_all_qos_target: 0.80
validation_violation_tolerance: 0.01
td3_actor_lr: 0.0001
td3_critic_lr: 0.0003
td3_policy_delay: 2
td3_target_noise: 0.15
td3_noise_clip: 0.30
td3_gradient_clip_norm: 10.0
td3_noise_reference_dim: 64
td3_critic_loss: huber
td3_layer_norm: true
ppo_horizon: 2048
gae_lambda: 0.95
train_bank_path: artifacts/scenario_banks/N64_train.npz
