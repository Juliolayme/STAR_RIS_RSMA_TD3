n_ris: 64
n_users: 4
p_max: 1.0
noise_power: 0.001
qos_min: 0.5
episode_length: 32
gamma: 0.99
tau: 0.005
hidden_dim: 512
batch_size: 256
replay_size: 300000
warmup_steps: 5000
train_steps: 150000
eval_scenarios: 1000
validation_interval: 5000
validation_scenarios: 1000
exploration_noise: 0.12
exploration_noise_final: 0.03
